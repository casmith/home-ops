---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sync-todoist-to-habitica
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controller:
      type: cronjob
      cronjob:
        concurrencyPolicy: Forbid
        schedule: "*/5 * * * *"
    restartPolicy: OnFailure
    image:
      repository: casmith/sync-todoist-to-habitica
      tag: latest
    env:
      INITIAL_SYNC_TOKEN: S9XrMjlm2q6cDRMsfI2JLCrJjpxq-yuLjBS23KlJq2NPnEE8rias0W7zGJO9XwEFyRxoCdQExpeCqppEhJmtsIP_l2FyjyzcS-6hOkeaNXBozlca
      CONFIG_DIR: /data
    envFrom:
      - secretRef:
          name: sync-todoist-to-habitica-secret
    service:
      main:
        enabled: false
    persistence:
      config:
        enabled: true
        existingClaim: sync-todoist-to-habitica-config-v1
        mountPath: /data
