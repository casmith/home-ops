---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dailytxt
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: dailytxt
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      dailytxt:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: phitux/dailytxt
              tag: 2.5.0
            env:
              INDENT: "4"
              ALLOW_REGISTRATION: "false"
              LOGOUT_AFTER_DAYS: "40"
            envFrom:
              - secretRef:
                  name: dailytxt-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        ports:
          http:
            port: &port 80
    route:
      app:
        hostnames: ["dailytxt.kalde.in"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        enabled: true
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: longhorn
        globalMounts:
          - path: /data
