---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app changedetection
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: changedetection
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      changedetection:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: dgtlmoon/changedetection.io
              tag: 0.55.7
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 750Mi

    service:
      app:
        ports:
          http:
            port: 5000

    # No direct route: changedetection has no OIDC, so it is exposed only via
    # the Authentik embedded proxy outpost. See ./httproute.yaml, which sends
    # changedetection.kalde.in to authentik-server (the outpost) instead.

    persistence:
      datastore:
        enabled: true
        existingClaim: changedetection-datastore-v1
        globalMounts:
          - path: /datastore
