---
apiVersion: v1
kind: ConfigMap
metadata:
  name: m4b-convert-script
  namespace: default
data:
  convert.sh: |
    #!/bin/sh
    # Multi-file MP3 audiobooks -> single chapterized M4B.
    #
    # All three dirs are subdirs of ONE NFS mount (/ingest), so every move
    # between them is a true rename within a single filesystem: atomic, no
    # copy, and it preserves the hardlink back to the seeding torrent.
    # Mounting them as separate NFS shares would make each move a
    # cross-device copy+chown, which fails as non-root on a squashed export.
    #
    # $IN entries are hardlinks to data transmission is still seeding, so this
    # NEVER writes into them; it only reads and, on success, renames the
    # ingest name away. The seeded inode survives.
    # $OUT is staged as .<name>.part and renamed into place, so the beets
    # cronjob never sees a partially-written book.
    set -eu

    IN=/ingest/audiobooks
    OUT=/ingest/converted
    FAILED=/ingest/failed

    BITRATE=${BITRATE:-96k}
    SAMPLERATE=${SAMPLERATE:-22050}
    CHANNELS=${CHANNELS:-1}
    JOBS=${JOBS:-4}

    # m4b-tool builds output here (local emptyDir); the finished book is then
    # relocated to NFS. Both must share one filesystem with M4BTOOL_TMP_DIR so
    # m4b-tool's internal tmp->output rename() stays intra-device.
    STAGE=/tmp/staging

    log() { echo "[$(date -Is)] $*"; }

    mkdir -p "$IN" "$OUT" "$FAILED" "$STAGE"

    # concurrencyPolicy:Forbid only serializes *scheduled* runs; a manually
    # created Job (e.g. a smoke test) can still overlap a scheduled tick, and
    # two pods sharing these NFS dirs rm -rf each other's work. Take a shared
    # lock (mkdir is atomic on NFS) so any second run bails cleanly. Reclaim a
    # lock older than 180m in case a holder died without releasing it.
    LOCK=/ingest/.m4b-convert.lock
    if [ -d "$LOCK" ] && [ -z "$(find "$LOCK" -maxdepth 0 -mmin -180 2>/dev/null)" ]; then
      log "clearing stale lock"
      rmdir "$LOCK" 2>/dev/null || true
    fi
    if ! mkdir "$LOCK" 2>/dev/null; then
      log "another m4b-convert run is active; exiting"
      exit 0
    fi
    trap 'rmdir "$LOCK" 2>/dev/null || true' EXIT INT TERM

    has_ext() {
      find "$1" -maxdepth 2 -type f -iname "*.$2" -print 2>/dev/null | head -n1 | grep -q .
    }

    count_m4b() {
      find "$1" -maxdepth 2 -type f \( -iname '*.m4b' -o -iname '*.m4a' \) 2>/dev/null | wc -l | tr -d ' '
    }

    publish() {
      # publish <work-dir> <name> — atomic rename into $OUT
      rm -rf "${OUT:?}/$2"
      mv "$1" "$OUT/$2"
    }

    fail() {
      # fail <src> <name>
      log "FAILED: $2"
      rm -rf "${FAILED:?}/$2"
      mv "$1" "$FAILED/$2"
    }

    # do_merge <src> <name> <mode>
    #   mode=transcode  MP3 (and friends) -> re-encoded AAC with the spoken-word
    #                   settings; filenames become chapter titles.
    #   mode=copy       multiple existing m4b/m4a parts -> single m4b via a
    #                   lossless stream copy (--no-conversion). No chapter
    #                   override, so embedded chapter marks are preserved;
    #                   m4b-tool falls back to per-file chapters when there
    #                   are none.
    do_merge() {
      src=$1
      name=$2
      mode=$3
      work="$OUT/.$name.part"        # NFS, hidden so beets ignores it
      stage="$STAGE/$name"           # local scratch, same FS as m4b-tool tmp
      rm -rf "$work" "$stage"
      mkdir -p "$stage"
      case "$mode" in
        transcode)
          log "converting (transcode): $name (bitrate=$BITRATE rate=$SAMPLERATE ch=$CHANNELS)"
          set -- --audio-bitrate "$BITRATE" --audio-samplerate "$SAMPLERATE" \
                 --audio-channels "$CHANNELS" --use-filenames-as-chapters
          ;;
        copy)
          log "merging (lossless): $name"
          set -- --no-conversion
          ;;
      esac
      # Build entirely on local scratch: m4b-tool's tmp->output rename() cannot
      # cross from the emptyDir onto NFS, so the output must land locally too.
      if m4b-tool merge "$src" \
          --output-file "$stage/$name.m4b" \
          --jobs "$JOBS" \
          --no-cache \
          --force \
          "$@"; then
        # Carry sidecars through for beets-audible / filetote to pick up.
        if [ -d "$src" ]; then
          for extra in cover.jpg cover.png folder.jpg metadata.opf desc.txt reader.txt; do
            [ -f "$src/$extra" ] && cp "$src/$extra" "$stage/" || true
          done
        fi
        # Relocate the finished book to NFS. It is a freshly built inode, so a
        # copy is correct (nothing to hardlink); cp without -p avoids the chown
        # a root-squashed export would reject. beets skips the hidden .part
        # dir until publish() reveals it via an atomic NFS->NFS rename.
        mkdir -p "$work"
        if cp -r "$stage/." "$work/"; then
          rm -rf "$stage"
          publish "$work" "$name"
          rm -rf "$src"
          log "done: $name"
        else
          rm -rf "$work" "$stage"
          fail "$src" "$name"
        fi
      else
        rm -rf "$work" "$stage"
        fail "$src" "$name"
      fi
    }

    passthrough() {
      # A single, already-final M4B — nothing to merge or transcode. Same
      # filesystem, so this is a rename that preserves the hardlink.
      src=$1
      name=$2
      work="$OUT/.$name.part"
      rm -rf "$work"
      if [ -d "$src" ]; then
        mv "$src" "$work"
      else
        mkdir -p "$work"
        mv "$src" "$work/"
      fi
      publish "$work" "$name"
      log "passthrough: $name"
    }

    found=0
    for src in "$IN"/*; do
      [ -e "$src" ] || continue
      name=$(basename "$src")
      case "$name" in .*) continue ;; esac
      found=$((found + 1))

      if [ -f "$src" ]; then
        case "$name" in
          *.m4b|*.M4B|*.m4a|*.M4A) passthrough "$src" "${name%.*}" ;;
          *.mp3|*.MP3)             do_merge "$src" "${name%.*}" transcode ;;
          *)                       fail "$src" "$name" ;;
        esac
      elif has_ext "$src" mp3; then
        do_merge "$src" "$name" transcode
      elif has_ext "$src" m4b || has_ext "$src" m4a; then
        # One m4b in the folder: already final, just move it. Multiple parts:
        # merge them losslessly into a single chapterized m4b.
        if [ "$(count_m4b "$src")" -gt 1 ]; then
          do_merge "$src" "$name" copy
        else
          passthrough "$src" "$name"
        fi
      else
        log "no audio found in: $name"
        fail "$src" "$name"
      fi
    done

    log "done, $found item(s) examined"
