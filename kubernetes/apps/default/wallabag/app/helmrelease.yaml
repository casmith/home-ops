---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wallabag
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    initContainers:
      01-init-db:
        image: ghcr.io/onedr0p/postgres-init:16.8
        imagePullPolicy: IfNotPresent
        envFrom: &envFrom
          - secretRef:
              name: wallabag-secret
    controller:
      replicas: 1
      strategy: RollingUpdate
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: wallabag/wallabag
      tag: latest
    env:
       SYMFONY__ENV__DOMAIN_NAME: https://walla.kalde.in
       SYMFONY__ENV__FROM_EMAIL: wallabag@kalde.in
       SYMFONY__ENV__FOSUSER_REGISTRATION: false
       POPULATE_DATABASE: true
    envFrom: *envFrom
    service:
      main:
        ports:
          http:
            port: &port 80
    serviceMonitor:
      main:
        enabled: true
    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        annotations:
          external-dns.alpha.kubernetes.io/target: "ingress.${SECRET_DOMAIN}"
        hosts:
          - host: &host "walla.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host

    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 750Mi
    persistence:
      volume:
        enabled: true
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/wallabag
