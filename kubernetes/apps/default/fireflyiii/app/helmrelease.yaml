---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: &app fireflyiii
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    initContainers:
      01-init-db:
        image: ghcr.io/onedr0p/postgres-init:16.2
        imagePullPolicy: IfNotPresent
        envFrom: &envFrom
          - secretRef:
              name: fireflyiii-secret
    controller:
      replicas: 1
      strategy: RollingUpdate
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: fireflyiii/core
      tag: version-6.1.6
    env:
      APP_URL: "https://fireflyiii.kalde.in"
      TRUSTED_PROXIES: "*"
    envFrom: *envFrom
    service:
      main:
        ports:
          http:
            port: &port 8080
    serviceMonitor:
      main:
        enabled: true
    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        annotations:
          external-dns.alpha.kubernetes.io/target: "ingress.${SECRET_DOMAIN}"
          hajimari.io/icon: "movie-roll"
        hosts:
          - host: &host "fireflyiii.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host

    persistence:
      config:
        enabled: true
        existingClaim: fireflyiii-config-v1
        mountPath: /var/www/html/storage/upload

        #    probes:
        #      liveness: &probes
        #        enabled: true
        #        custom: true
        #        spec:
        #          httpGet:
        #            path: /healthcheck
        #            port: *port
        #          initialDelaySeconds: 0
        #          periodSeconds: 10
        #          timeoutSeconds: 1
        #         failureThreshold: 3
        #  readiness: *probes
        #   startup:
        #    enabled: false
        #    topologySpreadConstraints:
        #     - maxSkew: 1
        #     topologyKey: kubernetes.io/hostname
        #  whenUnsatisfiable: DoNotSchedule
        #  labelSelector:
        #    matchLabels:
        #    app.kubernetes.io/name: *app
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 750Mi
