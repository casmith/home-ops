---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wiki
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: wiki
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      wiki:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: redimp/otterwiki
              tag: 2.21
            resources:
              requests:
                cpu: 10m
                memory: 250Mi
              limits:
                cpu: "1"
                memory: 1000Mi
    service:
      app:
        ports:
          http:
            port: &port 80
    # No direct route: exposed only via the Authentik proxy outpost.
    # See ./httproute.yaml.
    persistence:
      config:
        # Name predates the consolewiki -> wiki rename. Kept as-is so the
        # renamed Kustomization adopts the existing volume; renaming it would
        # mean a copy-and-cutover migration for no functional gain.
        existingClaim: consolewiki-data-v1
        globalMounts:
          - path: /app-data
      backup:
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/backup/wiki
        globalMounts:
          - path: /backup
