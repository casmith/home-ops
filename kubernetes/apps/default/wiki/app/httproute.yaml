---
# wiki fronted by the Authentik embedded proxy outpost.
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wiki-auth
  namespace: default
spec:
  hostnames:
    - wiki.kalde.in
  parentRefs:
    - name: external
      namespace: kube-system
      sectionName: https
    - name: internal
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - name: authentik-server
          namespace: security
          port: 80
