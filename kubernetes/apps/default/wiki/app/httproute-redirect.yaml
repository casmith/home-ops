---
# Permanent redirect for the pre-rename hostname. Deliberately not behind the
# Authentik outpost: it only issues a 301, so there is nothing to protect, and
# keeping it unauthenticated means an expired session still lands on the new
# URL instead of a login prompt for an application that no longer exists.
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: consolewiki-redirect
  namespace: default
spec:
  hostnames:
    - consolewiki.kalde.in
  parentRefs:
    - name: external
      namespace: kube-system
      sectionName: https
    - name: internal
      namespace: kube-system
      sectionName: https
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: wiki.kalde.in
            statusCode: 301
