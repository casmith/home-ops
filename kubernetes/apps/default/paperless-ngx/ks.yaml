---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-paperless-ngx
  namespace: flux-system
spec:
  path: ./kubernetes/apps/default/paperless-ngx/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: paperless-ngx
      namespace: default
  interval: 30m
  retryInterval: 1m
  timeout: 3m
  dependsOn:
    - name: cluster-apps-paperless-ngx-broker

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-paperless-ngx-broker
  namespace: flux-system
spec:
  path: ./kubernetes/apps/default/paperless-ngx/redis
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
