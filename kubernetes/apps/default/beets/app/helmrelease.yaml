---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app beets
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      beets:
        type: cronjob
        cronjob:
          concurrencyPolicy: Forbid
          startingDeadlineSeconds: 60
          # A large import can outrun the interval; Forbid above keeps two
          # beets processes off the one SQLite library. Offset ten minutes
          # behind m4b-convert.
          schedule: "*/15 * * * *"
        containers:
          app:
            image:
              repository: ghcr.io/gtronset/beets-audiobooks
              tag: 2.2.0
            # The image is linuxserver-based, so its entrypoint is the s6
            # supervisor (/init) and never exits. Override it with the driver
            # script, which normalizes tags then runs the headless import.
            # PUID/PGID setup is replaced by the securityContext below.
            command: ["/bin/sh"]
            args: ["/scripts/run.sh"]
            env:
              TZ: America/Chicago
              BEETSDIR: /beets
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
            restartPolicy: Never

      # On-demand shell for the exceptions the cronjob can't auto-match
      # (0-candidate / ambiguous books). Kept scaled to 0; bring it up only
      # to run an INTERACTIVE `beet import`, which needs the E/R prompts:
      #   kubectl -n default patch cronjob beets -p '{"spec":{"suspend":true}}'
      #   kubectl -n default scale deploy/beets-shell --replicas=1
      #   kubectl -n default exec -it deploy/beets-shell -- beet import /input
      #   kubectl -n default scale deploy/beets-shell --replicas=0
      #   kubectl -n default patch cronjob beets -p '{"spec":{"suspend":false}}'
      # Suspending the cron first keeps two pods off the one RWO SQLite library.
      shell:
        type: deployment
        replicas: 0
        containers:
          app:
            image:
              repository: ghcr.io/gtronset/beets-audiobooks
              tag: 2.2.0
            command: ["sleep", "infinity"]
            env:
              TZ: America/Chicago
              BEETSDIR: /beets
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1024
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    service:
      beets:
        enabled: false

    persistence:
      # SQLite library + import log — keep it off NFS.
      config:
        enabled: true
        existingClaim: beets-config-v1
        globalMounts:
          - path: /config
      beets-config:
        enabled: true
        type: configMap
        name: beets-config
        globalMounts:
          - path: /beets
      scripts:
        enabled: true
        type: configMap
        name: beets-scripts
        defaultMode: 0555
        globalMounts:
          - path: /scripts
      # Output of the m4b-convert cronjob, which is fed in turn by the
      # transmission host's script-torrent-done hook. Everything here is
      # already a single M4B.
      input:
        enabled: true
        type: nfs
        server: 192.168.10.101
        path: /downloads/ingest/converted
        globalMounts:
          - path: /input
      audiobooks:
        enabled: true
        type: nfs
        server: 192.168.10.3
        path: /volume1/share2/audiobooks
        globalMounts:
          - path: /audiobooks
