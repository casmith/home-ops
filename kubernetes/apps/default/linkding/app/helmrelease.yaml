---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app linkding
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: linkding
  interval: 30m

  values:
    controllers:
      linkding:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: sissbruecker/linkding
              tag: 1.45.0
            env:
              # SSO via Authentik. Linkding matches/links the account by
              # email, so the existing Linkding user's email must equal the
              # Authentik user's email. Client id/secret come from the secret.
              LD_ENABLE_OIDC: "True"
              OIDC_OP_AUTHORIZATION_ENDPOINT: https://auth.kalde.in/application/o/authorize/
              OIDC_OP_TOKEN_ENDPOINT: https://auth.kalde.in/application/o/token/
              OIDC_OP_USER_ENDPOINT: https://auth.kalde.in/application/o/userinfo/
              OIDC_OP_JWKS_ENDPOINT: https://auth.kalde.in/application/o/linkding/jwks/
              OIDC_RP_SIGN_ALGO: RS256
              OIDC_RP_SCOPES: "openid profile email"
            envFrom:
              - secretRef:
                  name: linkding-secret
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 750Mi

    service:
      app:
        type: LoadBalancer
        ports:
          http:
            port: &port 9090

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Linkding
          gethomepage.dev/description: Bookmark manager
          gethomepage.dev/group: Infrastructure
          gethomepage.dev/icon: linkding.png
          gethomepage.dev/href: https://linkding.kalde.in
        hostnames: ["{{ .Release.Name }}.kalde.in"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        enabled: true
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/linkding/data
        globalMounts:
          - path: /etc/linkding/data
