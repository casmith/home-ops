---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dailytrace-frontend
  namespace: default
spec:
  dependsOn:
    - name: dailytrace-backend
      namespace: default
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: dailytrace-frontend
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      frontend:
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: casmith/dailytrace-frontend
              tag: 2026.05.24.a0b397b9
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 750Mi
    service:
      frontend:
        ports:
          http:
            port: 8080
    # No direct route: dailytrace.kalde.in now goes through the dailytrace-proxy
    # nginx behind the Authentik outpost (see ../proxy). The frontend is reached
    # internally via its Service.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: *app
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 750Mi
