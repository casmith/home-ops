---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stirling-pdf
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: stirling-pdf
  interval: 30m

  values:
    controllers:
      stirling-pdf:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/stirling-tools/stirling-pdf
              tag: 2.13.1-fat
            env:
              TZ: America/Chicago
              # The JWKS fetch (legacy HttpURLConnection in Nimbus) reads time
              # out only inside the JVM — curl/python pull the same endpoint from
              # this pod in <1s. Stirling runs with Spring virtual threads, and
              # HttpURLConnection's synchronized blocking I/O is known to pin/stall
              # virtual threads. Disable them. Set via JDK_JAVA_OPTIONS so the
              # image's JAVA_TOOL_OPTIONS tuning is preserved.
              JDK_JAVA_OPTIONS: -Dspring.threads.virtual.enabled=false
              DISABLE_ADDITIONAL_FEATURES: "false"
              LANGS: en_US
              SYSTEM_DEFAULTLOCALE: en-US
              # SSO via Authentik. Enables Stirling's login system + OAuth2.
              # client id/secret come from stirling-pdf-secret. provider name
              # "authentik" sets the redirect path /login/oauth2/code/authentik.
              SECURITY_ENABLELOGIN: "true"
              SECURITY_OAUTH2_ENABLED: "true"
              SECURITY_OAUTH2_PROVIDER: authentik
              SECURITY_OAUTH2_ISSUER: https://auth.kalde.in/application/o/stirling-pdf/
              SECURITY_OAUTH2_SCOPES: "openid, profile, email"
              SECURITY_OAUTH2_USEASUSERNAME: email
              SECURITY_OAUTH2_AUTOCREATEUSER: "true"
              SECURITY_OAUTH2_BLOCKREGISTRATION: "false"
            envFrom:
              - secretRef:
                  name: stirling-pdf-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/info/status
                    port: &port 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/info/status
                    port: *port
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  # allow up to ~10m for the fat image's first boot (LibreOffice/unoserver + Spring Boot)
                  failureThreshold: 60
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      # Pin auth.kalde.in to the internal gateway so Stirling's server-side OIDC
      # calls stay in-cluster instead of hairpinning out through Cloudflare
      # (cluster DNS resolves it publicly). /etc/hosts wins over DNS in
      # getaddrinfo, so this is independent of CoreDNS config.
      hostAliases:
        - ip: 192.168.10.252
          hostnames:
            - auth.kalde.in

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["{{ .Release.Name }}.kalde.in"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      configs:
        enabled: true
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/stirling-pdf/configs
        globalMounts:
          - path: /configs
      tmp:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp
