---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stirling-pdf
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: stirling-pdf
  interval: 30m

  values:
    controllers:
      stirling-pdf:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/stirling-tools/stirling-pdf
              tag: 2.11.0-fat
            env:
              TZ: America/Chicago
              DISABLE_ADDITIONAL_FEATURES: "false"
              LANGS: en_US
              SYSTEM_DEFAULTLOCALE: en-US
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/info/status
                    port: &port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["{{ .Release.Name }}.kalde.in"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      configs:
        enabled: true
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/stirling-pdf/configs
        globalMounts:
          - path: /configs
      tmp:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp
