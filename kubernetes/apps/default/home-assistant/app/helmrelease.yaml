---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 30m
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Pin to the amd64 control-plane nodes (k8s-cp-*). The arm64 Raspberry Pi
    # workers boot HA slowly enough that the aiodns import races and aiohttp
    # caches a broken DNS resolver for the whole process, breaking every
    # network integration. The faster x86 nodes boot cleanly.
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/arch: amd64
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.6.3@sha256:82db7a297c96a0288559c5f2849878168c14a06557edc114084d874268c92a9a
            env:
              TZ: America/Chicago
              HASS_HTTP_TRUSTED_PROXY_1: 10.42.0.0/16
            resources:
              requests:
                cpu: 1
                memory: 1Gi
              limits:
                memory: 1.5Gi

    service:
      app:
        ports:
          http:
            port: &port 8123

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Home Assistant
          gethomepage.dev/description: Home automation
          gethomepage.dev/group: Home
          gethomepage.dev/icon: home-assistant.png
          gethomepage.dev/href: https://home-assistant.kalde.in
        hostnames: ["home-assistant.kalde.in"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        enabled: true
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/home-assistant/config
        globalMounts:
          - path: /config
      # GitOps-managed Lovelace dashboards (the "Elmdon" YAML dashboard).
      # Directory mount (not subPath) so kubelet syncs edits into the pod live.
      dashboards:
        type: configMap
        name: home-assistant-dashboards
        globalMounts:
          - path: /config/dashboards
            readOnly: true
