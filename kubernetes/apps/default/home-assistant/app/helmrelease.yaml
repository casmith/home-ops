---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 30m
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.6.2@sha256:124cfd97bf15112d770cd60d1ded0eb8739fb3123b9a32bf85978d4cfa27b1a3
            env:
              TZ: America/Chicago
              HASS_HTTP_TRUSTED_PROXY_1: 10.42.0.0/16
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 750Mi

    service:
      app:
        ports:
          http:
            port: &port 8123

    route:
      app:
        hostnames: ["home-assistant.kalde.in"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        enabled: true
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/home-assistant/config
        globalMounts:
          - path: /config
      # GitOps-managed Lovelace dashboards (the "Elmdon" YAML dashboard).
      # Directory mount (not subPath) so kubelet syncs edits into the pod live.
      dashboards:
        type: configMap
        name: home-assistant-dashboards
        globalMounts:
          - path: /config/dashboards
            readOnly: true
