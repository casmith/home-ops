---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app teslamate-grafana
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: teslamate-grafana
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      teslamate-grafana:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: teslamate/grafana
              tag: 3.1
            env:
              DATABASE_HOST: postgres17-rw.database.svc.cluster.local
              GF_METRICS_ENABLED: "true"
              GF_METRICS_DISABLE_TOTAL_STATS: "true"
              # Required for OAuth redirects to resolve to the public URL
              GF_SERVER_ROOT_URL: https://tesla-grafana.kalde.in
              # SSO via Authentik (client id/secret come from teslamate-secret).
              # Local admin login is kept as break-glass (form not disabled).
              GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
              GF_AUTH_GENERIC_OAUTH_NAME: Authentik
              GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile"
              GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://auth.kalde.in/application/o/authorize/
              GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://auth.kalde.in/application/o/token/
              GF_AUTH_GENERIC_OAUTH_API_URL: https://auth.kalde.in/application/o/userinfo/
              GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
              GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
              # Single-user homelab: grant Admin to anyone who logs in via
              # Authentik. Tighten to a group mapping if more users are added.
              GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "'Admin'"
            envFrom:
              - secretRef:
                  name: teslamate-secret
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 750Mi

    service:
      app:
        ports:
          http:
            port: &port 3000

    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: http
            path: /metrics

    route:
      app:
        hostnames: ["tesla-grafana.kalde.in"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        enabled: true
        existingClaim: teslamate-grafana-v1
        globalMounts:
          - path: /var/lib/grafana
