---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app teslamate-mosquitto
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controller:
      replicas: 1
      strategy: RollingUpdate
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: eclipse-mosquitto
      tag: 2
    command: mosquitto
    args:
     - -c
     - "/mosquitto-no-auth.conf"
    service:
      main:
        ports:
          http:
            port: &port 1883
    serviceMonitor:
      main:
        enabled: true
    persistence:
      config:
        enabled: true
        existingClaim: teslamate-mosquitto-config-v2
        mountPath: /mosquitto/config
      data:
        enabled: true
        existingClaim: teslamate-mosquitto-data-v2
        mountPath: /mosquitto/data
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 750Mi
