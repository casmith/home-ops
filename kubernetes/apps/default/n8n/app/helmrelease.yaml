apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: default
spec:
  releaseName: n8n
  chart:
    spec:
      chart: n8n
      version: "0.25.0"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: flux-system
  interval: 1h
  values:
    image:
      tag: latest
    service:
      type: ClusterIP
      port: 5678
    env:
      - name: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - name: N8N_BASIC_AUTH_USER
        value: "admin"
      - name: N8N_BASIC_AUTH_PASSWORD
        value: "admin"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
