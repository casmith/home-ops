---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-blueprint-romm
  namespace: security
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-blueprint-romm
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        romm.yaml: |
          version: 1
          metadata:
            name: romm
            labels:
              blueprints.goauthentik.io/instantiate: "true"
          entries:
            # RomM's OIDC client requires email_verified in the claims; the
            # built-in email scope doesn't guarantee it. Custom email scope
            # mapping that returns email + email_verified=true.
            - model: authentik_providers_oauth2.scopemapping
              id: mapping-romm-email
              state: present
              identifiers:
                name: romm-email-verified
              attrs:
                name: romm-email-verified
                scope_name: email
                description: "Email + email_verified for RomM"
                expression: |
                  return {
                      "email": request.user.email,
                      "email_verified": True
                  }
            - model: authentik_providers_oauth2.oauth2provider
              id: provider-romm
              state: present
              identifiers:
                name: romm
              attrs:
                name: romm
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                client_type: confidential
                client_id: "{{ .OAUTH_CLIENT_ID }}"
                client_secret: "{{ .OAUTH_CLIENT_SECRET }}"
                grant_types:
                  - authorization_code
                  - refresh_token
                redirect_uris:
                  - url: https://romm.kalde.in/api/oauth/openid
                    matching_mode: strict
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !KeyOf mapping-romm-email
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
            - model: authentik_core.application
              id: app-romm
              state: present
              identifiers:
                slug: romm
              attrs:
                name: RomM
                slug: romm
                provider: !KeyOf provider-romm
                meta_launch_url: https://romm.kalde.in
                meta_description: ROM library
                policy_engine_mode: any
  dataFrom:
    - extract:
        key: romm
  refreshInterval: 5m
