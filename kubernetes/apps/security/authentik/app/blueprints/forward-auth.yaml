---
# Forward-auth apps (no OIDC) gated by the Authentik embedded proxy outpost.
#
# Everything for forward-auth lives in THIS single blueprint on purpose: the
# embedded outpost's `providers` is one shared list, and the providers it
# references must be defined in the same blueprint so they can be linked with
# !KeyOf (deterministic). A separate file referencing providers via !Find
# races on first apply and silently leaves the outpost with no providers.
#
# To add a forward-auth app: add its proxyprovider + application entries, then
# add one `- !KeyOf provider-<app>` line to the outpost's providers list below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-forward-auth
  namespace: security
data:
  forward-auth.yaml: |
    version: 1
    metadata:
      name: forward-auth
    entries:
      # ── changedetection ──────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-changedetection
        state: present
        identifiers:
          name: changedetection
        attrs:
          name: changedetection
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://changedetection.kalde.in
          internal_host: http://changedetection.default.svc.cluster.local:5000
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-changedetection
        state: present
        identifiers:
          slug: changedetection
        attrs:
          name: Changedetection
          slug: changedetection
          provider: !KeyOf provider-changedetection
          meta_launch_url: https://changedetection.kalde.in
          meta_description: Website change monitor
          policy_engine_mode: any

      # ── tautulli ──────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-tautulli
        state: present
        identifiers:
          name: tautulli
        attrs:
          name: tautulli
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://tautulli.kalde.in
          internal_host: http://tautulli.media.svc.cluster.local:8181
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-tautulli
        state: present
        identifiers:
          slug: tautulli
        attrs:
          name: Tautulli
          slug: tautulli
          provider: !KeyOf provider-tautulli
          meta_launch_url: https://tautulli.kalde.in
          meta_description: Plex statistics
          policy_engine_mode: any

      # ── sabnzbd ───────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-sabnzbd
        state: present
        identifiers:
          name: sabnzbd
        attrs:
          name: sabnzbd
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://sabnzbd.kalde.in
          internal_host: http://sabnzbd.media.svc.cluster.local
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-sabnzbd
        state: present
        identifiers:
          slug: sabnzbd
        attrs:
          name: SABnzbd
          slug: sabnzbd
          provider: !KeyOf provider-sabnzbd
          meta_launch_url: https://sabnzbd.kalde.in
          meta_description: Usenet downloader
          policy_engine_mode: any

      # ── prometheus ────────────────────────────────────────────────────
      # skip_path_regex exempts /federate from auth so the observability
      # cluster's federation scrape (GET /federate) keeps working; the UI is
      # still gated. Internal-only (see httproute), like the rest of prometheus.
      - model: authentik_providers_proxy.proxyprovider
        id: provider-prometheus
        state: present
        identifiers:
          name: prometheus
        attrs:
          name: prometheus
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://prometheus.kalde.in
          internal_host: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
          internal_host_ssl_validation: false
          skip_path_regex: ^/federate
      - model: authentik_core.application
        id: app-prometheus
        state: present
        identifiers:
          slug: prometheus
        attrs:
          name: Prometheus
          slug: prometheus
          provider: !KeyOf provider-prometheus
          meta_launch_url: https://prometheus.kalde.in
          meta_description: Metrics
          policy_engine_mode: any

      # ── homepage ──────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-homepage
        state: present
        identifiers:
          name: homepage
        attrs:
          name: homepage
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://homepage.kalde.in
          internal_host: http://homepage.default.svc.cluster.local:3000
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-homepage
        state: present
        identifiers:
          slug: homepage
        attrs:
          name: Homepage
          slug: homepage
          provider: !KeyOf provider-homepage
          meta_launch_url: https://homepage.kalde.in
          meta_description: Dashboard
          policy_engine_mode: any

      # ── embedded outpost: every forward-auth provider must be listed ──
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          providers:
            - !KeyOf provider-changedetection
            - !KeyOf provider-tautulli
            - !KeyOf provider-sabnzbd
            - !KeyOf provider-prometheus
            - !KeyOf provider-homepage
