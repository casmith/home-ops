---
# Forward-auth apps (no OIDC) gated by the Authentik embedded proxy outpost.
#
# Everything for forward-auth lives in THIS single blueprint on purpose: the
# embedded outpost's `providers` is one shared list, and the providers it
# references must be defined in the same blueprint so they can be linked with
# !KeyOf (deterministic). A separate file referencing providers via !Find
# races on first apply and silently leaves the outpost with no providers.
#
# To add a forward-auth app: add its proxyprovider + application entries, then
# add one `- !KeyOf provider-<app>` line to the outpost's providers list below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-forward-auth
  namespace: security
data:
  forward-auth.yaml: |
    version: 1
    metadata:
      name: forward-auth
    entries:
      # ── changedetection ──────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-changedetection
        state: present
        identifiers:
          name: changedetection
        attrs:
          name: changedetection
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://changedetection.kalde.in
          internal_host: http://changedetection.default.svc.cluster.local:5000
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-changedetection
        state: present
        identifiers:
          slug: changedetection
        attrs:
          name: Changedetection
          slug: changedetection
          provider: !KeyOf provider-changedetection
          meta_launch_url: https://changedetection.kalde.in
          meta_description: Website change monitor
          policy_engine_mode: any

      # ── tautulli ──────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-tautulli
        state: present
        identifiers:
          name: tautulli
        attrs:
          name: tautulli
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://tautulli.kalde.in
          internal_host: http://tautulli.media.svc.cluster.local:8181
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-tautulli
        state: present
        identifiers:
          slug: tautulli
        attrs:
          name: Tautulli
          slug: tautulli
          provider: !KeyOf provider-tautulli
          meta_launch_url: https://tautulli.kalde.in
          meta_description: Plex statistics
          policy_engine_mode: any

      # ── sabnzbd ───────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-sabnzbd
        state: present
        identifiers:
          name: sabnzbd
        attrs:
          name: sabnzbd
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://sabnzbd.kalde.in
          internal_host: http://sabnzbd.media.svc.cluster.local
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-sabnzbd
        state: present
        identifiers:
          slug: sabnzbd
        attrs:
          name: SABnzbd
          slug: sabnzbd
          provider: !KeyOf provider-sabnzbd
          meta_launch_url: https://sabnzbd.kalde.in
          meta_description: Usenet downloader
          policy_engine_mode: any

      # ── prometheus ────────────────────────────────────────────────────
      # skip_path_regex exempts /federate from auth so the observability
      # cluster's federation scrape (GET /federate) keeps working; the UI is
      # still gated. Internal-only (see httproute), like the rest of prometheus.
      - model: authentik_providers_proxy.proxyprovider
        id: provider-prometheus
        state: present
        identifiers:
          name: prometheus
        attrs:
          name: prometheus
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://prometheus.kalde.in
          internal_host: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
          internal_host_ssl_validation: false
          skip_path_regex: ^/federate
      - model: authentik_core.application
        id: app-prometheus
        state: present
        identifiers:
          slug: prometheus
        attrs:
          name: Prometheus
          slug: prometheus
          provider: !KeyOf provider-prometheus
          meta_launch_url: https://prometheus.kalde.in
          meta_description: Metrics
          policy_engine_mode: any

      # ── homepage ──────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-homepage
        state: present
        identifiers:
          name: homepage
        attrs:
          name: homepage
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://homepage.kalde.in
          internal_host: http://homepage.default.svc.cluster.local:3000
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-homepage
        state: present
        identifiers:
          slug: homepage
        attrs:
          name: Homepage
          slug: homepage
          provider: !KeyOf provider-homepage
          meta_launch_url: https://homepage.kalde.in
          meta_description: Dashboard
          policy_engine_mode: any

      # ── longhorn (internal-only; no built-in auth) ──────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-longhorn
        state: present
        identifiers:
          name: longhorn
        attrs:
          name: longhorn
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://longhorn.kalde.in
          internal_host: http://longhorn-frontend.longhorn-system.svc.cluster.local
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-longhorn
        state: present
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          slug: longhorn
          provider: !KeyOf provider-longhorn
          meta_launch_url: https://longhorn.kalde.in
          meta_description: Storage
          policy_engine_mode: any

      # ── zigbee2mqtt (internal-only; no built-in auth; websocket UI) ─────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-zigbee2mqtt
        state: present
        identifiers:
          name: zigbee2mqtt
        attrs:
          name: zigbee2mqtt
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://z2m.kalde.in
          internal_host: http://zigbee2mqtt.default.svc.cluster.local:8080
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-zigbee2mqtt
        state: present
        identifiers:
          slug: zigbee2mqtt
        attrs:
          name: Zigbee2MQTT
          slug: zigbee2mqtt
          provider: !KeyOf provider-zigbee2mqtt
          meta_launch_url: https://z2m.kalde.in
          meta_description: Zigbee
          policy_engine_mode: any

      # ── teslamate (no built-in auth; exposes car location/driving data) ──
      - model: authentik_providers_proxy.proxyprovider
        id: provider-teslamate
        state: present
        identifiers:
          name: teslamate
        attrs:
          name: teslamate
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://tesla.kalde.in
          internal_host: http://teslamate.default.svc.cluster.local:4000
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-teslamate
        state: present
        identifiers:
          slug: teslamate
        attrs:
          name: TeslaMate
          slug: teslamate
          provider: !KeyOf provider-teslamate
          meta_launch_url: https://tesla.kalde.in
          meta_description: Tesla logger
          policy_engine_mode: any

      # ── kapowarr ─────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-kapowarr
        state: present
        identifiers:
          name: kapowarr
        attrs:
          name: kapowarr
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://kapowarr.kalde.in
          internal_host: http://kapowarr.default.svc.cluster.local:5656
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-kapowarr
        state: present
        identifiers:
          slug: kapowarr
        attrs:
          name: Kapowarr
          slug: kapowarr
          provider: !KeyOf provider-kapowarr
          meta_launch_url: https://kapowarr.kalde.in
          meta_description: Comics
          policy_engine_mode: any

      # ── consolewiki / OtterWiki (multi-user; PROXY_HEADER auth) ─────────
      # OtterWiki has no OIDC; it reads identity from reverse-proxy headers.
      # The outpost injects x-otterwiki-name/email/permissions via the scope
      # mapping below so OtterWiki stays multi-user but sourced from Authentik.
      - model: authentik_core.group
        id: group-otterwiki-admins
        state: present
        identifiers:
          name: otterwiki-admins
        attrs:
          name: otterwiki-admins
      - model: authentik_providers_oauth2.scopemapping
        id: mapping-otterwiki-headers
        state: present
        identifiers:
          name: otterwiki-headers
        attrs:
          name: otterwiki-headers
          scope_name: otterwiki
          description: "Inject x-otterwiki-* headers for OtterWiki PROXY_HEADER auth"
          expression: |
            return {
                "ak_proxy": {
                    "user_attributes": {
                        "additionalHeaders": {
                            "x-otterwiki-name": request.user.name,
                            "x-otterwiki-email": request.user.email,
                            "x-otterwiki-permissions": "READ,WRITE,UPLOAD,ADMIN" if ak_is_group_member(request.user, name="otterwiki-admins") else "READ,WRITE,UPLOAD",
                        }
                    }
                }
            }
      - model: authentik_providers_proxy.proxyprovider
        id: provider-consolewiki
        state: present
        identifiers:
          name: consolewiki
        attrs:
          name: consolewiki
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://consolewiki.kalde.in
          internal_host: http://consolewiki.default.svc.cluster.local:80
          internal_host_ssl_validation: false
          # Exempt this per-token pull URL from auth (like prometheus /federate):
          # the sha256 token in the path is itself the credential, so a client
          # can poll it without an Authentik session. UI stays gated.
          skip_path_regex: ^/-/api/v1/pull/94608178e55edaff7bb85c4fe020bc334bd03c03381381e68f1d3dbd8074a627
          property_mappings:
            - !KeyOf mapping-otterwiki-headers
      - model: authentik_core.application
        id: app-consolewiki
        state: present
        identifiers:
          slug: consolewiki
        attrs:
          name: OtterWiki
          slug: consolewiki
          provider: !KeyOf provider-consolewiki
          meta_launch_url: https://consolewiki.kalde.in
          meta_description: Wiki
          policy_engine_mode: any

      # ── sonarr ────────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-sonarr
        state: present
        identifiers:
          name: sonarr
        attrs:
          name: sonarr
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://sonarr.kalde.in
          internal_host: http://sonarr.media.svc.cluster.local
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-sonarr
        state: present
        identifiers:
          slug: sonarr
        attrs:
          name: Sonarr
          slug: sonarr
          provider: !KeyOf provider-sonarr
          meta_launch_url: https://sonarr.kalde.in
          meta_description: TV series management
          policy_engine_mode: any

      # ── radarr ────────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-radarr
        state: present
        identifiers:
          name: radarr
        attrs:
          name: radarr
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://radarr.kalde.in
          internal_host: http://radarr.media.svc.cluster.local
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-radarr
        state: present
        identifiers:
          slug: radarr
        attrs:
          name: Radarr
          slug: radarr
          provider: !KeyOf provider-radarr
          meta_launch_url: https://radarr.kalde.in
          meta_description: Movie management
          policy_engine_mode: any

      # ── lidarr ────────────────────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        id: provider-lidarr
        state: present
        identifiers:
          name: lidarr
        attrs:
          name: lidarr
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://lidarr.kalde.in
          internal_host: http://lidarr.media.svc.cluster.local:8686
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-lidarr
        state: present
        identifiers:
          slug: lidarr
        attrs:
          name: Lidarr
          slug: lidarr
          provider: !KeyOf provider-lidarr
          meta_launch_url: https://lidarr.kalde.in
          meta_description: Music management
          policy_engine_mode: any

      # ── dailytrace ────────────────────────────────────────────────────
      # Proxies to the dailytrace-proxy nginx, which path-splits /api -> backend
      # and / -> frontend (the app itself has no login).
      - model: authentik_providers_proxy.proxyprovider
        id: provider-dailytrace
        state: present
        identifiers:
          name: dailytrace
        attrs:
          name: dailytrace
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://dailytrace.kalde.in
          internal_host: http://dailytrace-proxy.default.svc.cluster.local:8080
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-dailytrace
        state: present
        identifiers:
          slug: dailytrace
        attrs:
          name: Dailytrace
          slug: dailytrace
          provider: !KeyOf provider-dailytrace
          meta_launch_url: https://dailytrace.kalde.in
          meta_description: Daily journal / tracker
          policy_engine_mode: any

      # ── lease-inventory (external backend on cerritos, not in-cluster) ──
      # internal_host is the host-networked lease-inventory app on cerritos
      # (192.168.8.10:8892), reached over the LAN from the authentik-server pod.
      - model: authentik_providers_proxy.proxyprovider
        id: provider-leases
        state: present
        identifiers:
          name: leases
        attrs:
          name: leases
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://leases.kalde.in
          internal_host: http://192.168.8.10:8892
          internal_host_ssl_validation: false
      - model: authentik_core.application
        id: app-leases
        state: present
        identifiers:
          slug: leases
        attrs:
          name: Lease Inventory
          slug: leases
          provider: !KeyOf provider-leases
          meta_launch_url: https://leases.kalde.in
          meta_description: Kea DHCP lease inventory
          policy_engine_mode: any

      # ── embedded outpost: every forward-auth provider must be listed ──
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          providers:
            - !KeyOf provider-changedetection
            - !KeyOf provider-tautulli
            - !KeyOf provider-sabnzbd
            - !KeyOf provider-prometheus
            - !KeyOf provider-homepage
            - !KeyOf provider-longhorn
            - !KeyOf provider-zigbee2mqtt
            - !KeyOf provider-teslamate
            - !KeyOf provider-kapowarr
            - !KeyOf provider-consolewiki
            - !KeyOf provider-sonarr
            - !KeyOf provider-radarr
            - !KeyOf provider-lidarr
            - !KeyOf provider-dailytrace
            - !KeyOf provider-leases
