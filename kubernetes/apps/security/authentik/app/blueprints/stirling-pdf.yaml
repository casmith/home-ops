---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-blueprint-stirling-pdf
  namespace: security
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-blueprint-stirling-pdf
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        stirling-pdf.yaml: |
          version: 1
          metadata:
            name: stirling-pdf
            labels:
              blueprints.goauthentik.io/instantiate: "true"
          entries:
            - model: authentik_providers_oauth2.oauth2provider
              id: provider-stirling-pdf
              state: present
              identifiers:
                name: stirling-pdf
              attrs:
                name: stirling-pdf
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                client_type: confidential
                client_id: "{{ .OAUTH_CLIENT_ID }}"
                client_secret: "{{ .OAUTH_CLIENT_SECRET }}"
                grant_types:
                  - authorization_code
                  - refresh_token
                redirect_uris:
                  - url: https://stirling-pdf.kalde.in/login/oauth2/code/authentik
                    matching_mode: strict
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
            - model: authentik_core.application
              id: app-stirling-pdf
              state: present
              identifiers:
                slug: stirling-pdf
              attrs:
                name: Stirling-PDF
                slug: stirling-pdf
                provider: !KeyOf provider-stirling-pdf
                meta_launch_url: https://stirling-pdf.kalde.in
                meta_description: PDF tools
                policy_engine_mode: any
  dataFrom:
    - extract:
        key: stirling-pdf
  refreshInterval: 5m
