---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-blueprint-linkding
  namespace: security
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-blueprint-linkding
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        linkding.yaml: |
          version: 1
          metadata:
            name: linkding
            labels:
              blueprints.goauthentik.io/instantiate: "true"
          entries:
            - model: authentik_providers_oauth2.oauth2provider
              id: provider-linkding
              state: present
              identifiers:
                name: linkding
              attrs:
                name: linkding
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                client_type: confidential
                client_id: "{{ .OAUTH_CLIENT_ID }}"
                client_secret: "{{ .OAUTH_CLIENT_SECRET }}"
                # 2026.5+: blueprint-created providers default to an empty
                # grant_types list, which blocks the auth-code flow. Set it.
                grant_types:
                  - authorization_code
                  - refresh_token
                redirect_uris:
                  - url: https://linkding.kalde.in/oidc/callback/
                    matching_mode: strict
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
            - model: authentik_core.application
              id: app-linkding
              state: present
              identifiers:
                slug: linkding
              attrs:
                name: Linkding
                slug: linkding
                provider: !KeyOf provider-linkding
                meta_launch_url: https://linkding.kalde.in
                meta_description: Bookmark manager
                policy_engine_mode: any
  dataFrom:
    - extract:
        key: linkding
  refreshInterval: 5m
