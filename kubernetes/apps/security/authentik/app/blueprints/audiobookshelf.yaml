---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-blueprint-audiobookshelf
  namespace: security
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-blueprint-audiobookshelf
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        audiobookshelf.yaml: |
          version: 1
          metadata:
            name: audiobookshelf
            labels:
              blueprints.goauthentik.io/instantiate: "true"
          entries:
            - model: authentik_providers_oauth2.oauth2provider
              id: provider-audiobookshelf
              state: present
              identifiers:
                name: audiobookshelf
              attrs:
                name: audiobookshelf
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
                client_type: confidential
                client_id: "{{ .OAUTH_CLIENT_ID }}"
                client_secret: "{{ .OAUTH_CLIENT_SECRET }}"
                grant_types:
                  - authorization_code
                  - refresh_token
                redirect_uris:
                  # Web login callback.
                  - url: https://audiobookshelf.kalde.in/auth/openid/callback
                    matching_mode: strict
                  # The iOS/Android apps complete the flow on a custom scheme.
                  - url: audiobookshelf://oauth
                    matching_mode: strict
                property_mappings:
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
                  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
                signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
            - model: authentik_core.application
              id: app-audiobookshelf
              state: present
              identifiers:
                slug: audiobookshelf
              attrs:
                name: Audiobookshelf
                slug: audiobookshelf
                provider: !KeyOf provider-audiobookshelf
                meta_launch_url: https://audiobookshelf.kalde.in
                meta_description: Audiobook library
                policy_engine_mode: any
  dataFrom:
    - extract:
        key: audiobookshelf
  refreshInterval: 5m
