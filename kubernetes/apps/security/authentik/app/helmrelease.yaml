---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 2026.5.5
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: security
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: authentik-redis
      namespace: security
  values:
    global:
      # AUTHENTIK_SECRET_KEY, AUTHENTIK_BOOTSTRAP_*, AUTHENTIK_POSTGRESQL__PASSWORD
      envFrom:
        - secretRef:
            name: authentik-secret
    authentik:
      log_level: info
      error_reporting:
        enabled: false
      postgresql:
        host: postgres17-rw.database.svc.cluster.local
        name: authentik
        user: authentik
      redis:
        host: authentik-redis-app.security.svc.cluster.local
      # Outbound SMTP (Purelymail) — powers the password-recovery emails.
      # Non-secret settings only; username/password/from come from the
      # `authentik` 1Password item via authentik-secret (global.envFrom).
      # These MUST stay here rather than in the secret: the chart renders
      # values set here as explicit container `env`, which takes precedence
      # over `envFrom` — so a use_tls set via the secret would be silently
      # overridden by the chart's default of false.
      email:
        host: smtp.purelymail.com
        port: 587
        use_tls: true # 587 = STARTTLS (465 would be use_ssl instead)
        use_ssl: false
        timeout: 30
    # bundled Bitnami PostgreSQL subchart disabled — we use CloudNative-PG
    postgresql:
      enabled: false
    # per-app SSO definitions, applied by the worker (see ./blueprints/)
    blueprints:
      secrets:
        - authentik-blueprint-audiobookshelf
        - authentik-blueprint-miniflux
        - authentik-blueprint-linkding
        - authentik-blueprint-teslamate-grafana
        - authentik-blueprint-mealie
        - authentik-blueprint-paperless
        - authentik-blueprint-stirling-pdf
        - authentik-blueprint-romm
      configMaps:
        - authentik-blueprint-recovery-email
        - authentik-blueprint-forward-auth
        - authentik-blueprint-access-control
    server:
      replicas: 1
      initContainers:
        # creates the authentik database + role before the server starts
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.4
          envFrom:
            - secretRef:
                name: authentik-secret
      ingress:
        enabled: false
      metrics:
        enabled: false
    worker:
      replicas: 1
      # Restart the worker when any mounted blueprint ConfigMap/Secret changes,
      # so blueprints re-apply immediately instead of waiting for Authentik's
      # discovery interval. Only the worker (it applies blueprints); the
      # server's embedded outpost picks up provider changes via API polling, so
      # gating/login stay up.
      deploymentAnnotations:
        reloader.stakater.com/auto: "true"
