---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  releaseName: longhorn
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      interval: 5m
  values:
    # Declarative backup target. The chart owns the `default` BackupTarget CR,
    # so this keeps the setting in git instead of the UI. NFS needs no creds.
    defaultBackupStore:
      backupTarget: nfs://192.168.10.3:/volume1/cluster/backup/longhorn
      backupTargetCredentialSecret: ""
      pollInterval: 300
    persistence:
      # numberOfReplicas on the default `longhorn` StorageClass (new PVCs).
      defaultClassReplicaCount: 3
      # Bind every new volume from the default StorageClass to the backup job's
      # group so it is automatically backed up.
      recurringJobSelector:
        enable: true
        jobList: '[{"name":"default","isGroup":true}]'
    defaultSettings:
      # Global fallback when a StorageClass does not specify (bumped 2 -> 3).
      defaultReplicaCount: "3"
      defaultLonghornStaticStorageClass: longhorn
      # Only create a default disk (i.e. store replica data) on nodes labeled
      # node.longhorn.io/create-default-disk=true — the amd64 cp nodes. Keeps
      # Longhorn storage off the arm64 Pi nodes (which still run general
      # workloads + can mount volumes, just never host replicas).
      createDefaultDiskLabeledNodes: true
      # Auto-roll volume engines to the default image after a manager upgrade
      # (max 3/node, live + health-checked). Keeps stale engine-image
      # DaemonSets from piling up on every node. 0 = disabled (the default).
      concurrentAutomaticEngineUpgradePerNodeLimit: 3
    longhornUI:
      replicas: 1  # built-in UI; exposed via HTTPRoute, not the chart ingress
    ingress:
      enabled: false
