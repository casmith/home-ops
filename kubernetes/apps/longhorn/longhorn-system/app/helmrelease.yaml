---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  releaseName: longhorn
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: 1.11.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      interval: 5m
  values:
    persistence:
      defaultClassReplicaCount: 3
    defaultSettings:
      # Pattern A (opt-out): Longhorn runs everywhere by default.
      # To exclude specific nodes (e.g., small Pis), taint those nodes and do NOT add a toleration here.
      #
      # Proposed taint to exclude a node from Longhorn:
      #   node.longhorn.io/disable=true:NoSchedule
      #
      # Example:
      #   kubectl taint nodes k8s-pi-2 node.longhorn.io/disable=true:NoSchedule
      #
      # Note: Leaving `taintToleration` unset/empty means Longhorn system-managed components
      # will not tolerate the custom disable taint.

      defaultReplicaCount: "2"
      defaultLonghornStaticStorageClass: longhorn

    longhornUI:
      replicas: 0  # Disable the built-in UI
    ingress:
      enabled: false
