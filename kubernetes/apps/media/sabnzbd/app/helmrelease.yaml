---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sabnzbd
  namespace: media
spec:
  interval: 15m
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  chartRef:
    kind: OCIRepository
    name: sabnzbd

  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5

  values:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/master
                  operator: DoesNotExist
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist

    controllers:
      sabnzbd:
        pod:
          securityContext:
            runAsUser: 1026
            runAsGroup: 65537
            fsGroup: 65537
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups:
              - 100
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/sabnzbd
              tag: 5.0.4@sha256:457be5fad7b83c338a981f1945e1ecae2dedd0cc81cdd2992673b0dc84fc2890
            env:
              TZ: "America/Chicago"
              SABNZBD__PORT: &port 80
              SABNZBD__HOST_WHITELIST_ENTRIES: >-
                sabnzbd,
                sabnzbd.media,
                sabnzbd.media.svc,
                sabnzbd.media.svc.cluster,
                sabnzbd.media.svc.cluster.local,
                sabnzbd.kalde.in
            resources:
              requests:
                memory: 2048Mi
                cpu: "1.5"
              limits:
                memory: 2048Mi
                cpu: "3"

    service:
      app:
        ports:
          http:
            port: *port

    # No direct route: sabnzbd has no OIDC, so it is exposed only via the
    # Authentik embedded proxy outpost. See ./httproute.yaml, which sends
    # sabnzbd.kalde.in to authentik-server (the outpost) instead. The
    # HOST_WHITELIST_ENTRIES above keep sabnzbd.kalde.in so sabnzbd accepts
    # the proxied request.

    persistence:
      config:
        enabled: true
        existingClaim: sabnzbd-config-v1
      downloads:
        enabled: true
        type: nfs
        server: "192.168.10.3"
        path: /volume1/downloads/complete
        globalMounts:
          - path: /downloads
      incomplete:
        enabled: true
        type: nfs
        server: "192.168.10.3"
        path: /volume1/downloads/incomplete
        globalMounts:
          - path: /incomplete-downloads
      backup:
        enabled: true
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/backup/sabnzbd
        globalMounts:
          - path: /backup
