---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./cronjobs
configMapGenerator:
  - name: lidarr-configmap
    files:
      - flac2mp3.sh=./resources/flac2mp3.sh
      - lidarr-flac2mp3-batch.sh=./resources/lidarr-flac2mp3-batch.sh
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
