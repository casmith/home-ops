---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dispatcharr-celery
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: ghcr.io/dispatcharr/dispatcharr
      tag: latest
    command: ["/bin/bash"]
    args: ["-c", "cd /app && celery -A dispatcharr worker -l info"]
    env:
      TZ: America/Chicago
      REDIS_HOST: dispatcharr-redis
      CELERY_BROKER_URL: redis://dispatcharr-redis:6379/0
      DISPATCHARR_LOG_LEVEL: info
    envFrom:
      - secretRef:
          name: dispatcharr-secret
    service:
      main:
        ports:
          http:
            port: 9191
    resources:
      requests:
        cpu: .5
        memory: 100Mi
      limits:
        cpu: .5
        memory: 500Mi

