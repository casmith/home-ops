---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dispatcharr
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    initContainers:
      01-init-db:
        image: ghcr.io/onedr0p/postgres-init:17.4
        imagePullPolicy: IfNotPresent
        envFrom: &envFrom
          - secretRef:
              name: dispatcharr-secret
    image:
      repository: ghcr.io/dispatcharr/dispatcharr
      tag: latest
    env:
      TZ: America/Chicago
      REDIS_HOST: dispatcharr-redis
      CELERY_BROKER_URL: redis://dispatcharr-redis:6379/0
      DISPATCHARR_LOG_LEVEL: info
    envFrom: *envFrom
    service:
      main:
        ports:
          http:
            port: 9191
    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        hosts:
          - host: "{{ .Release.Name }}.kalde.in"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "{{ .Release.Name }}.kalde.in"
    resources:
      requests:
        cpu: 1
        memory: 1000Mi
      limits:
        cpu: 1
        memory: 2000Mi

