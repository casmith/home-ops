---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: internal-gateway
spec:
  endpoints:
    - dnsName: internal.${SECRET_DOMAIN}
      recordTTL: 300
      recordType: A
      targets:
        - 192.168.10.252
