---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beoftexas-runners
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: beoftexas-runners
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: beoftexas-runners-secret
      valuesKey: github_app_id
      targetPath: githubConfigSecret.github_app_id
    - kind: Secret
      name: beoftexas-runners-secret
      valuesKey: github_app_installation_id
      targetPath: githubConfigSecret.github_app_installation_id
    - kind: Secret
      name: beoftexas-runners-secret
      valuesKey: github_app_private_key
      targetPath: githubConfigSecret.github_app_private_key
  values:
    # Repository-level runner pool for beoftexas
    githubConfigUrl: https://github.com/casmith/beoftexas

    # Scaling configuration
    minRunners: 1
    maxRunners: 3

    # Runner template
    template:
      spec:
        nodeSelector:
          kubernetes.io/arch: arm64
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - k8s-pi-5
                        - k8s-pi-6
                        - k8s-pi-7
                        - k8s-pi-8
        containers:
          - name: runner
            image: ghcr.io/khaoslabs/actions-runner:2026-03-14-ea4841
            command: ["/home/runner/run.sh"]
            env:
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
              - name: DOCKER_HOST
                value: tcp://localhost:2375
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 512Mi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
          - name: dind
            image: docker:dind
            securityContext:
              privileged: true
            env:
              - name: DOCKER_TLS_CERTDIR
                value: ""
            resources:
              requests:
                memory: 512Mi
                cpu: 200m
              limits:
                memory: 1Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work

        # Storage for runner work directory
        volumes:
          - name: work
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: local-path
                  resources:
                    requests:
                      storage: 10Gi

    # Controller settings
    controllerServiceAccount:
      namespace: actions-runner-system
      name: actions-runner-controller
